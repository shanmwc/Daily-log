<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Daily Student Learning Log Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto; }
        h1 { color: #1e3a8a; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0; }
        .row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 200px; display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 6px; color: #4b5563; }
        select, input, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
        select:focus, input:focus, textarea:focus { border-color: #2563eb; }
        .session-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        .session-header { font-weight: bold; color: #1e40af; font-size: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; border-bottom: 1px dashed #cbd5e1; padding-bottom: 6px; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; width: 100%; margin-top: 20px; }
        button:hover { background: #1d4ed8; }
        .output-section { margin-top: 40px; display: none; background: white; padding: 20px; border: 1px solid #cbd5e1; border-radius: 8px; }
        .school-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 3px solid #1e3a8a; padding-bottom: 15px; }
        .logo-placeholder { width: 120px; height: 60px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #64748b; border: 2px dashed #94a3b8; border-radius: 4px; }
        .meta-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; background: #f1f5f9; }
        .meta-table td { padding: 12px; border: 1px solid #cbd5e1; font-weight: bold; color: #1e3a8a; }
        .log-table { width: 100%; border-collapse: collapse; }
        .log-table th, .log-table td { border: 1px solid #cbd5e1; padding: 12px; text-align: left; font-size: 14px; }
        .log-table th { background: #1e3a8a; color: white; font-weight: 600; }
        .log-table tr:nth-child(even) { background: #f8fafc; }
        .print-btn { background: #059669; margin-bottom: 15px; width: auto; }
        .print-btn:hover { background: #047857; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Teacher Entry Portal</h1>
    
    <div class="row">
        <div class="form-group">
            <label for="logDate">Date</label>
            <input type="date" id="logDate">
        </div>
        <div class="form-group">
            <label for="gradeSelect">Grade</label>
            <select id="gradeSelect" onchange="populateSessions()">
                <option value="">-- Choose Grade --</option>
                <option value="MYP 1 Omega">MYP 1 Omega</option>
                <option value="MYP 1 Delta">MYP 1 Delta</option>
                <option value="MYP 2">MYP 2</option>
                <option value="MYP 3">MYP 3</option>
                <option value="MYP 4">MYP 4</option>
                <option value="MYP 5">MYP 5</option>
                <option value="DP 1">DP 1</option>
                <option value="DP 2">DP 2</option>
            </select>
        </div>
        <div class="form-group">
            <label for="daySelect">Day of the Week</label>
            <select id="daySelect" onchange="populateSessions()">
                <option value="MON">Monday</option>
                <option value="TUE">Tuesday</option>
                <option value="WED">Wednesday</option>
                <option value="THUR">Thursday</option>
                <option value="FRI">Friday</option>
            </select>
        </div>
    </div>

    <div id="sessionsContainer"></div>

    <button onclick="generateTable()">Generate Daily Learning Log Table</button>

    <div id="outputSection" class="output-section">
        <button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
        <div class="school-header">
            <div>
                <h2 style="margin:0; color:#1e3a8a;">ELA GREEN SCHOOL</h2>
                <small style="color:#64748b;">Daily Learning Management System</small>
            </div>
            <div class="logo-placeholder">[ Ela logo.PNG ]</div>
        </div>
        <table class="meta-table">
            <tr>
                <td id="lblOutDate">Date: </td>
                <td id="lblOutGrade">Grade: </td>
                <td id="lblOutDay">Day: </td>
            </tr>
        </table>
        <table class="log-table">
            <thead>
                <tr>
                    <th style="width: 12%;">Session & Time</th>
                    <th style="width: 15%;">Subject</th>
                    <th style="width: 30%;">Daily Learning Update</th>
                    <th style="width: 20%;">Homework / Assignments</th>
                    <th style="width: 11%;">Due Date</th>
                    <th style="width: 12%;">Upcoming Assessments</th>
                </tr>
            </thead>
            <tbody id="logTableBody"></tbody>
        </table>
    </div>
</div>

    function populateSessions() {
        const grade = document.getElementById('gradeSelect').value;
        const day = document.getElementById('daySelect').value;
        const container = document.getElementById('sessionsContainer');
        container.innerHTML = "";

        if (!grade || !timetables[grade] || !timetables[grade][day]) {
            container.innerHTML = "<p style='color:#64748b; text-align:center;'>Please select a Grade to reveal session inputs.</p>";
            return;
        }

        const sessions = timetables[grade][day];
        sessions.forEach(session => {
            const card = document.createElement('div');
            card.className = "session-card";
            card.innerHTML = `
                <div class="session-header">
                    <span>Session ${session.s} (${session.t})</span>
                    <span style="color:#2563eb;">Subject: ${session.sub}</span>
                </div>
                <div class="row" data-session="${session.s}" data-subject="${session.sub}" data-time="${session.t}">
                    <div class="form-group" style="flex: 2;">
                        <label>Daily Learning Update</label>
                        <textarea class="txt-update" rows="2" placeholder="What did students learn today?"></textarea>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label>Homework / Assignments</label>
                        <textarea class="txt-homework" rows="2" placeholder="Enter assignment tasks..."></textarea>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Due Date</label>
                        <input type="date" class="txt-duedate">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Upcoming Assessments</label>
                        <input type="text" class="txt-assessment" placeholder="e.g. Unit Quiz">
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function generateTable() {
        const grade = document.getElementById('gradeSelect').value;
        const day = document.getElementById('daySelect').value;
        const rawDate = document.getElementById('logDate').value;

        if (!grade || !rawDate) {
            alert("Please ensure Date and Grade are completely filled out first.");
            return;
        }

        const formattedDate = new Date(rawDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

        document.getElementById('lblOutDate').innerText = "Date: " + formattedDate;
        document.getElementById('lblOutGrade').innerText = "Grade: " + grade;
        document.getElementById('lblOutDay').innerText = "Day: " + document.getElementById('daySelect').options[document.getElementById('daySelect').selectedIndex].text;

        const tableBody = document.getElementById('logTableBody');
        tableBody.innerHTML = "";

        const cards = document.querySelectorAll('.session-card .row');
        cards.forEach(card => {
            const sessionNum = card.getAttribute('data-session');
            const timeSlot = card.getAttribute('data-time');
            const subject = card.getAttribute('data-subject');
            const update = card.querySelector('.txt-update').value || "No update provided.";
            const homework = card.querySelector('.txt-homework').value || "None.";
            
            const rawDue = card.querySelector('.txt-duedate').value;
            const due = rawDue ? new Date(rawDue).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : "-";
            const assessment = card.querySelector('.txt-assessment').value || "-";

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>Session ${sessionNum}</strong><br><small style="color:#64748b;">${timeSlot}</small></td>
                <td><strong>${subject}</strong></td>
                <td>${update.replace(/\n/g, '<br>')}</td>
                <td>${homework.replace(/\n/g, '<br>')}</td>
                <td>${due}</td>
                <td style="color: #b91c1c; font-weight: 500;">${assessment}</td>
            `;
            tableBody.appendChild(tr);
        });

        document.getElementById('outputSection').style.display = "block";
        document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth' });
    }

    populateSessions();
</script>
